<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Scan - Web Cashier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #374151;
        }
        .container-scanner {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .header-title {
            color: #1e40af;
            font-weight: 700;
            border-bottom: 3px solid #3b82f6;
            padding-bottom: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e5e7eb !important;
            background-color: #f9fafb;
        }
        #reader__dashboard_section_csr button {
            background-color: #3b82f6 !important;
            color: white !important;
            border: none !important;
            padding: 8px 16px !important;
            border-radius: 6px !important;
            font-weight: 600 !important;
            cursor: pointer !important;
        }
        #reader__dashboard_section_csr button:hover {
            background-color: #2563eb !important;
        }
        .result-box {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
            text-align: left;
        }
        .btn-custom {
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            padding: 10px;
        }
    </style>
</head>
<body>

    <script src="firebase-config.js"></script>
    <script src="script.js"></script>

    <div class="container-scanner">
        <div class="header-title">
            <span>📷 Scan Barcode Belanjaan</span>
            <a href="index.html" class="btn btn-outline-secondary btn-sm fw-bold">🔙 Batal</a>
        </div>

        <div id="reader"></div>

        <div class="result-box">
            <label class="form-label fw-bold text-secondary mb-1" style="font-size: 0.85rem;">Hasil Pindai Barcode:</label>
            <input type="text" id="scanBarcodeResult" class="form-control form-control-sm fw-bold text-primary bg-white mb-2" placeholder="Menunggu deteksi kamera..." readonly>
            
            <label class="form-label fw-bold text-secondary mb-1" style="font-size: 0.85rem;">Nama Barang Terdeteksi:</label>
            <input type="text" id="resultNamaBarang" class="form-control form-control-sm fw-bold mb-3 bg-light text-muted" placeholder="Nama barang otomatis..." readonly>
            
            <button id="btnLanjutkan" class="btn btn-success btn-custom shadow-sm" onclick="lanjutKePenjualan()" disabled>🚀 Lanjutkan Ke Antrean Kasir</button>
        </div>

        <div id="wadah-footer-global"></div>
    </div>

    <script>
        let currentUser = null;
        let masterProdukLokal = {};

        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                // Dengarkan snapshot master produk untuk mencocokkan barcode seketika
                database.ref(`kasir_users/${user.uid}/master_produk`).on('value', (snapshot) => {
                    masterProdukLokal = snapshot.val() || {};
                });
            }
        });

        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('scanBarcodeResult').value = decodedText;
            
            let namaProdukTerpilih = "";
            for (let nama in masterProdukLokal) {
                if (masterProdukLokal[nama].barcode && masterProdukLokal[nama].barcode === decodedText) {
                    namaProdukTerpilih = nama;
                    break;
                }
            }

            if (namaProdukTerpilih !== "") {
                document.getElementById('resultNamaBarang').value = namaProdukTerpilih;
                document.getElementById('btnLanjutkan').disabled = false;
                Swal.fire({ title: "Barang Ditemukan! 🎉", text: namaProdukTerpilih, icon: "success", timer: 1500, showConfirmButton: false, customClass: { popup: 'rounded-4' } });
            } else {
                document.getElementById('resultNamaBarang').value = "Barcode Belum Terdaftar di Atur Produk!";
                document.getElementById('btnLanjutkan').disabled = true;
                Swal.fire({ title: "Tidak Dikenal ⚠️", text: "Kode barcode ini belum didaftarkan di sistem.", icon: "error", customClass: { popup: 'rounded-4' } });
            }
        }

        function onScanFailure(error) {}

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: { width: 250, height: 120 },
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            },
            false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        function lanjutKePenjualan() {
            const namaBarang = document.getElementById('resultNamaBarang').value;
            if (namaBarang && namaBarang !== "Barcode Belum Terdaftar di Atur Produk!") {
                window.location.href = `index.html?nama=${encodeURIComponent(namaBarang)}`;
            }
        }

        // PANGGIL COMPONENT FOOTER GLOBAL
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('wadah-footer-global').innerHTML = data;
            })
            .catch(error => console.error('Gagal memuat footer:', error));
    </script>
</body>
</html>
