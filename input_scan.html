<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Scan - Web Cashier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }
        .container-scanner {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #1e3a8a;
            font-weight: bold;
        }
        p.subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: none !important;
            background: #fafafa;
        }
        #reader__dashboard_section_csr button {
            background-color: #1e3a8a !important;
            color: white !important;
            border-radius: 6px !important;
            padding: 6px 12px !important;
            border: none !important;
            font-size: 14px !important;
        }
    </style>
</head>
<body>

    <script src="firebase-config.js"></script>

    <script>
        let currentUser = null;
        let masterProdukLokal = {};

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                database.ref(`kasir_users/${user.uid}/master_produk`).on('value', (snapshot) => {
                    masterProdukLokal = snapshot.val() || {};
                });
            }
        });
    </script>

    <div class="container-scanner">
        <div class="text-center">
            <h1>📷 Scan Barcode Belanjaan</h1>
            <p class="subtitle">Arahkan kamera ke barcode barang untuk memproses penjualan</p>
        </div>

        <div id="reader" class="mb-4"></div>

        <div class="card p-3 bg-light border text-start shadow-sm" style="font-size: 0.9rem;">
            <label class="fw-bold text-secondary mb-2">📋 Informasi Hasil Scan:</label>
            
            <div class="mb-2">
                <label class="form-label small fw-semibold mb-1">Kode Barcode</label>
                <input type="text" id="resultBarcode" class="form-control form-control-sm fw-mono bg-white text-dark" placeholder="Menunggu scan..." readonly>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-semibold mb-1">Nama Barang Ditemukan</label>
                <input type="text" id="resultNamaBarang" class="form-control form-control-sm bg-white fw-bold text-success" placeholder="Produk tidak diketahui" readonly>
            </div>

            <div class="row g-2">
                <div class="col-12 mb-2">
                    <button id="btnLanjutkan" class="btn btn-success btn-sm w-100 fw-bold shadow-sm py-2" onclick="lanjutKePenjualan()" disabled>🚀 Lanjutkan ke Penjualan</button>
                </div>
                <div class="col-12">
                    <a href="index.html" class="btn btn-secondary btn-sm w-100 fw-bold shadow-sm">🔙 Batal</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('resultBarcode').value = decodedText;
            let ditemukan = false;
            let namaProdukTerpilih = "";

            // Cari nama produk berdasarkan barcode di data master
            for (let nama in masterProdukLokal) {
                if (masterProdukLokal[nama].barcode && masterProdukLokal[nama].barcode === decodedText) {
                    namaProdukTerpilih = nama;
                    ditemukan = true;
                    break;
                }
            }

            if (ditemukan) {
                document.getElementById('resultNamaBarang').value = namaProdukTerpilih;
                document.getElementById('btnLanjutkan').disabled = false;
                Swal.fire({ title: "Barang Ditemukan! 🎉", text: namaProdukTerpilih, icon: "success", timer: 1500, showConfirmButton: false, customClass: { popup: 'rounded-4' } });
            } else {
                document.getElementById('resultNamaBarang').value = "Barcode Belum Terdaftar di Atur Produk!";
                document.getElementById('btnLanjutkan').disabled = true;
                Swal.fire({ title: "Tidak Dikenal ⚠️", text: "Kode barcode ini belum didaftarkan di sistem.", icon: "error", customClass: { popup: 'rounded-4' } });
            }
        }

        function onScanFailure(error) {}

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: { width: 250, height: 120 },
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            },
            false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        // REVISI FITUR: SEKARANG YANG DIKIRIM KE URL ADALAH NAMA BARANGNYA LANGSUNG (MISAL: Matcha bubuk A)
        function lanjutKePenjualan() {
            const namaBarang = document.getElementById('resultNamaBarang').value;
            if (namaBarang && namaBarang !== "Barcode Belum Terdaftar di Atur Produk!") {
                window.location.href = `index.html?nama=${encodeURIComponent(namaBarang)}`;
            }
        }
    </script>
</body>
</html>
