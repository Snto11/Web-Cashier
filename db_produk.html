<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Daftar Produk & Harga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            padding: 20px;
        }

        .container-master {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: none;
        }

        .produk-row td {
            vertical-align: middle;
        }

        .material-symbols-outlined {
            font-size: 20px;
            vertical-align: middle;
            display: inline-block;
            line-height: 1;
        }

        .sticky-thead {
            position: sticky;
            top: 0;
            background-color: #f8f9fa;
            z-index: 2;
        }

        #btnHapusCariMaster {
            display: none;
        }
    </style>
</head>

<body>

    <script src="firebase-config.js"></script>
    <script src="script.js"></script>

    <script>
        let currentUser = null;
        let masterProdukLokal = {};

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                database.ref(`kasir_users/${user.uid}/master_produk`).on('value', (snapshot) => {
                    masterProdukLokal = snapshot.val() || {};
                    muatTabelMasterProduk();

                    const urlParams = new URLSearchParams(window.location.search);
                    const barcodeBaruDariScan = urlParams.get('scan_barcode');
                    if (barcodeBaruDariScan) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                        document.getElementById('swalBarcodeBarang').value = barcodeBaruDariScan;
                        aturTombolHapusBarcode(); // <-- Tambahkan baris ini
                        document.getElementById('swalNamaBarang').focus();
                    }
                });
            }
        });

        function simpanMasterKeFirebase(dataBaru) {
            if (currentUser) database.ref(`kasir_users/${currentUser.uid}/master_produk`).set(dataBaru);
        }
    </script>

    <div class="container-master py-4">
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm border">
            <h3 class="m-0 fw-bold text-primary">⚙️ Data Produk</h3>
            <a href="index.html"
                class="btn btn-secondary btn-sm fw-bold shadow-sm d-inline-flex align-items-center gap-1">
                <span class="material-symbols-outlined">arrow_back</span> Kembali
            </a>
        </div>

        <div class="row g-3">
            <div class="col-12 col-md-5">
                <div class="card p-3 bg-white border text-start shadow-sm sticky-top" style="top: 20px;">
                    <label class="fw-bold text-secondary mb-2" id="swalLabelInput">➕ Tambah / Update Produk:</label>
                    <input type="text" id="swalNamaBarang" class="form-control form-control-sm mb-2"
                        placeholder="Nama Barang">

                    <!-- <div class="d-flex gap-2 mb-2">
                        <input type="text" id="swalBarcodeBarang" inputmode="numeric" pattern="[0-9]*"
                            class="form-control form-control-sm fw-mono w-75" placeholder="Kode Barcode (Opsional)">
                        <a href="scan.html"
                            class="btn btn-primary btn-sm fw-bold d-flex align-items-center justify-content-center"
                            title="Buka Kamera Scan Master" style="width: 45px;">
                            <span class="material-symbols-outlined" style="color: white;">barcode_reader</span>
                        </a>
                    </div> -->

                    <div class="input-group input-group-sm mb-2">
                        <input type="text" id="swalBarcodeBarang" inputmode="numeric" pattern="[0-9]*"
                            class="form-control fw-mono" placeholder="Kode Barcode (Opsional)">

                        <!-- Tombol Hapus Barcode (Disembunyikan secara default dengan d-none) -->
                        <button class="btn btn-outline-secondary text-danger d-none" type="button" id="btnHapusBarcode"
                            onclick="hapusInputBarcode()" title="Kosongkan Barcode">
                            🗑️
                        </button>

                        <a href="scan.html"
                            class="btn btn-primary fw-bold d-flex align-items-center justify-content-center"
                            title="Buka Kamera Scan Master" style="width: 45px;">
                            <span class="material-symbols-outlined" style="color: white;">barcode_reader</span>
                        </a>
                    </div>

                    <!-- <div class="input-group input-group-sm mb-2">
                        <span class="input-group-text">Rp</span>
                        <input type="text" id="swalHargaBarangTampilan" inputmode="numeric" class="form-control"
                            placeholder="Harga Satuan">
                    </div> -->

                    <!-- KODE BARU -->
                    <div class="input-group input-group-sm mb-1">
                        <span class="input-group-text">Rp</span>
                        <input type="text" id="swalHargaBarangTampilan" inputmode="numeric" class="form-control"
                            placeholder="Harga Satuan">
                    </div>
                    <!-- Tombol Tambah 000 (Disembunyikan default dengan d-none) -->
                    <div class="mb-2 d-none" id="wadahBtnRibuan">
                        <button type="button" class="btn btn-outline-primary btn-sm py-0 px-2 fw-bold"
                            style="font-size: 0.75rem;" onclick="tambahKoinRibuan()">
                            +000
                        </button>
                    </div>

                    <input type="number" id="swalStokBarang" class="form-control form-control-sm mb-3"
                        placeholder="Jumlah Sisa Stok">

                    <div id="swalWadahTombol">

                        <button
                            class="btn btn-primary btn-sm w-100 fw-bold d-inline-flex align-items-center justify-content-center gap-1"
                            id="swalBtnSimpan" onclick="simpanMasterProduk()" title="Simpan Data">
                            <span class="material-symbols-outlined">save</span> Simpan
                        </button>

                    </div>
                </div>
            </div>

            <div class="col-12 col-md-7">
                <div class="card p-3 bg-white shadow-sm">
                    <div class="mb-3">
                        <div class="input-group input-group-sm">
                            <input type="text" id="swalCariProduk" class="form-control"
                                placeholder="🔍 Cari nama atau barcode...">

                            <button class="btn btn-outline-secondary text-danger" type="button" id="btnHapusCariMaster"
                                onclick="document.getElementById('swalCariProduk').value = ''; document.getElementById('swalCariProduk').dispatchEvent(new Event('input')); document.getElementById('swalCariProduk').focus();"
                                title="Kosongkan Pencarian">🗑️</button>
                        </div>
                    </div>
                    <div class="table-responsive border rounded" style="max-height: 480px; overflow-y: auto;">
                        <table class="table table-sm table-hover text-center m-0" id="swalTabelMaster">
                            <thead class="table-secondary small sticky-thead">

                                <tr class="align-middle">
                                    <th>No</th>
                                    <th class="text-start">Nama Barang</th>
                                    <th class="text-end">Harga</th>
                                    <th style="cursor: pointer; user-select: none;" onclick="urutkanBerdasarkanStok()"
                                        title="Klik untuk mengurutkan sisa stok">
                                        Stok <span id="iconSortirStok" class="text-muted"
                                            style="font-size: 0.8rem;">⇅</span>
                                    </th>
                                    <th>Aksi</th>
                                </tr>


                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-3">Memuat data produk...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="wadah-footer-global"></div>

    </div>

    <script>
        document.getElementById('swalHargaBarangTampilan').addEventListener('input', function (e) {
            e.target.value = formatRupiah(e.target.value.replace(/\D/g, ""));
        });

        document.getElementById('swalCariProduk').addEventListener('input', function (e) {
            const kataKunci = e.target.value.trim();
            const btnHapus = document.getElementById('btnHapusCariMaster');

            // MENGATUR VISIBILITAS TOMBOL HAPUS
            if (kataKunci !== "") {
                btnHapus.style.display = 'block'; // Tampilkan jika ada teks
            } else {
                btnHapus.style.display = 'none';  // Sembunyikan jika kosong
            }

            if (kataKunci === "") {
                document.querySelectorAll('#swalTabelMaster tbody .produk-row').forEach(row => {
                    row.style.setProperty('display', '', 'important');
                });
                return;
            }

            const hurufKataKunci = kataKunci.toLowerCase().split("");
            const polaRegExFuzzy = new RegExp(hurufKataKunci.join(".*"));

            document.querySelectorAll('#swalTabelMaster tbody .produk-row').forEach(row => {
                const namaAtribut = row.getAttribute('data-nama') || "";
                const barcodeAtribut = row.getAttribute('data-barcode') || "";

                if (polaRegExFuzzy.test(namaAtribut) || polaRegExFuzzy.test(barcodeAtribut)) {
                    row.style.setProperty('display', '', 'important');
                } else {
                    row.style.setProperty('display', 'none', 'important');
                }
            });
        });

        // Variabel untuk menyimpan status arah urutan (asc = terkecil ke terbesar, desc = terbesar ke terkecil)
        let arahSortirStok = 'asc';

        window.urutkanBerdasarkanStok = function () {
            // 1. Ubah objek masterProdukLokal menjadi array agar bisa disortir/diurutkan
            let arrayProduk = Object.keys(masterProdukLokal).map(nama => {
                return { nama: nama, ...masterProdukLokal[nama] };
            });

            // 2. Lakukan pengurutan berdasarkan properti stok
            arrayProduk.sort((a, b) => {
                let stokA = Number(a.stok) || 0;
                let stokB = Number(b.stok) || 0;

                if (arahSortirStok === 'asc') {
                    return stokA - stokB; // Dari terkecil ke terbesar
                } else {
                    return stokB - stokA; // Dari terbesar ke terkecil
                }
            });

            // 3. Bangun ulang objek masterProdukLokal sesuai urutan yang baru
            let objekTerurut = {};
            arrayProduk.forEach(item => {
                objekTerurut[item.nama] = {
                    harga: item.harga,
                    stok: item.stok,
                    barcode: item.barcode
                };
            });

            // 4. Masukkan kembali ke objek lokal dan perbarui tampilan tabel
            masterProdukLokal = objekTerurut;
            muatTabelMasterProduk();

            // 5. Balik arah sortir untuk klik berikutnya & update icon indikator
            const iconIndikator = document.getElementById('iconSortirStok');
            if (arahSortirStok === 'asc') {
                arahSortirStok = 'desc';
                if (iconIndikator) iconIndikator.innerText = ' ⬇️ (Kecil → Besar)';
            } else {
                arahSortirStok = 'asc';
                if (iconIndikator) iconIndikator.innerText = ' ⬆️ (Besar → Kecil)';
            }
        };

        function aturTombolHapusBarcode() {
            const inputBarcode = document.getElementById('swalBarcodeBarang');
            const btnHapus = document.getElementById('btnHapusBarcode');

            if (inputBarcode.value.trim() !== "") {
                btnHapus.classList.remove('d-none'); // Tampilkan tombol
            } else {
                btnHapus.classList.add('d-none');    // Sembunyikan tombol
            }
        }

        // document.getElementById('swalBarcodeBarang').addEventListener('input', aturTombolHapusBarcode);

        document.getElementById('swalBarcodeBarang').addEventListener('input', function (e) {
            // Menghapus semua karakter selain angka (0-9)
            this.value = this.value.replace(/\D/g, '');

            // Tetap menjalankan fungsi bawaan Anda untuk menampilkan/menyembunyikan tombol hapus
            aturTombolHapusBarcode();
        });

        // Function yang dipanggil saat tombol hapus barcode diklik
        function hapusInputBarcode() {
            const inputBarcode = document.getElementById('swalBarcodeBarang');
            inputBarcode.value = '';
            aturTombolHapusBarcode(); // Sembunyikan tombol setelah dihapus
            inputBarcode.focus();     // Fokuskan kembali ke input
        }

        function muatTabelMasterProduk() {
            const tbody = document.querySelector('#swalTabelMaster tbody');
            tbody.innerHTML = '';
            let barisTabel = '';
            let nomorUrutMaster = 1;

            for (let nama in masterProdukLokal) {
                let barcodeTampil = masterProdukLokal[nama].barcode ? `<br><small class="text-muted fw-mono" style="font-size: 0.75rem;">📋 ${masterProdukLokal[nama].barcode}</small>` : '';

                barisTabel += `<tr class="produk-row" data-nama="${nama.toLowerCase()}" data-barcode="${(masterProdukLokal[nama].barcode || '').toLowerCase()}">
                    <td class="text-muted fw-semibold small">${nomorUrutMaster++}</td>
                    <td class="text-start small nama-produk-kolom"><span class="fw-bold">${nama}</span>${barcodeTampil}</td>
                    <td class="text-end small text-nowrap">Rp ${formatRupiah(masterProdukLokal[nama].harga)}</td>
                    <td class="text-center small fw-semibold text-primary">${masterProdukLokal[nama].stok} pcs</td>
                    <td>
                        <div class="d-flex flex-row justify-content-center align-items-center">
                            <button class="btn btn-warning btn-sm p-1 py-0 shadow-sm me-1" onclick="isiFormMasterProduk('${nama}', ${masterProdukLokal[nama].harga}, ${masterProdukLokal[nama].stok}, '${masterProdukLokal[nama].barcode || ''}')">✏️</button>
                            <button class="btn btn-danger btn-sm p-1 py-0 shadow-sm" onclick="hapusMasterProduk('${nama}')">🗑️</button>
                        </div>
                    </td>
                </tr>`;
            }

            tbody.innerHTML = barisTabel || '<tr><td colspan="5" class="text-muted py-3">Belum ada daftar produk di database.</td></tr>';

            const inputCari = document.getElementById('swalCariProduk');
            if (inputCari && inputCari.value !== "") {
                inputCari.dispatchEvent(new Event('input'));
            }
        }

        // Fungsi untuk menampilkan/menyembunyikan tombol +000
        function aturTombolRibuan() {
            const inputHarga = document.getElementById('swalHargaBarangTampilan');
            const wadahBtnRibuan = document.getElementById('wadahBtnRibuan');

            // 1. Format rupiah saat mengetik (fungsi bawaan kamu)
            inputHarga.addEventListener('input', function (e) {
                e.target.value = formatRupiah(e.target.value.replace(/\D/g, ""));
            });

            // 2. Tampilkan tombol ketika input DIKLIK / DIFOKUSKAN
            inputHarga.addEventListener('focus', function () {
                wadahBtnRibuan.classList.remove('d-none');
            });

            // 3. Sembunyikan tombol ketika pengguna KLIK DI LUAR input (blur)
            inputHarga.addEventListener('blur', function () {
                // Beri sedikit jeda (delay) 200ms agar klik pada tombol "+000" sempat tereksekusi sebelum tombolnya hilang
                setTimeout(() => {
                    wadahBtnRibuan.classList.add('d-none');
                }, 200);
            });
        }

        //     const inputHarga = document.getElementById('swalHargaBarangTampilan');
        //     const wadahBtn = document.getElementById('wadahBtnRibuan');

        //     if (inputHarga.value.trim() !== "") {
        //         wadahBtn.classList.remove('d-none'); // Tampilkan jika ada isinya
        //     } else {
        //         wadahBtn.classList.add('d-none');    // Sembunyikan jika kosong
        //     }
        // }

        // // Event listener saat pengguna mengetik di input harga
        // document.getElementById('swalHargaBarangTampilan').addEventListener('input', function (e) {
        //     // Format rupiah otomatis bawaan kamu
        //     e.target.value = formatRupiah(e.target.value.replace(/\D/g, ""));

        //     // Cek status visibilitas tombol +000
        //     aturTombolRibuan();
        // });

        // Fungsi ketika tombol +000 diklik
        function tambahKoinRibuan() {
            let nilaiBersih = inputHarga.value.replace(/\D/g, ""); // Ambil angka murni

            if (nilaiBersih !== "") {
                nilaiBersih += "000"; // Tambahkan "000"
                inputHarga.value = formatRupiah(nilaiBersih); // Format ke Rupiah
            }

            inputHarga.focus();

            // const inputHarga = document.getElementById('swalHargaBarangTampilan');
            // let nilaiBersih = inputHarga.value.replace(/\D/g, ""); // Ambil angka murninya

            // if (nilaiBersih !== "") {
            //     nilaiBersih += "000"; // Tambahkan "000" di belakang angka
            //     inputHarga.value = formatRupiah(nilaiBersih); // Format kembali ke Rupiah
            //     inputHarga.focus(); // Kembalikan fokus ke input
            // }
        }

        let namaProdukLamaYangSedangDiedit = "";
        window.isiFormMasterProduk = function (nama, harga, stok, barcode) {
            document.getElementById('swalNamaBarang').value = nama;
            document.getElementById('swalBarcodeBarang').value = barcode;
            aturTombolHapusBarcode();
            document.getElementById('swalHargaBarangTampilan').value = formatRupiah(harga);
            aturTombolRibuan();
            document.getElementById('swalStokBarang').value = stok;
            namaProdukLamaYangSedangDiedit = nama;
            document.getElementById('swalLabelInput').innerText = "✏️ Edit Produk Terpilih:";
            document.getElementById('swalWadahTombol').innerHTML = `<div class="row g-2">
                <div class="col-8"><button class="btn btn-warning btn-sm w-100 fw-bold shadow-sm" onclick="simpanMasterProduk()">Perbarui Data</button></div>
                <div class="col-4"><button class="btn btn-secondary btn-sm w-100 fw-bold shadow-sm" onclick="window.batalEditMasterProduk()">Batal</button></div>
            </div>`;
        };

        window.batalEditMasterProduk = function () {
            namaProdukLamaYangSedangDiedit = "";
            document.getElementById('swalNamaBarang').value = "";
            document.getElementById('swalBarcodeBarang').value = "";
            aturTombolHapusBarcode();
            document.getElementById('swalHargaBarangTampilan').value = "";
            aturTombolRibuan();
            document.getElementById('swalStokBarang').value = "";
            document.getElementById('swalLabelInput').innerText = "➕ Tambah / Update Produk:";
            document.getElementById('swalWadahTombol').innerHTML = `<button class="btn btn-primary btn-sm w-100 fw-bold d-inline-flex align-items-center justify-content-center gap-1" id="swalBtnSimpan" onclick="simpanMasterProduk()">
                <span class="material-symbols-outlined">save</span> Simpan </button>`;
        };

        window.simpanMasterProduk = function () {
            const nama = document.getElementById('swalNamaBarang').value.trim();
            const barcode = document.getElementById('swalBarcodeBarang').value.trim();
            const harga = Number(document.getElementById('swalHargaBarangTampilan').value.replace(/\D/g, "")) || 0;
            const stok = Number(document.getElementById('swalStokBarang').value) || 0;

            if (!nama || harga <= 0) {
                Swal.fire({ title: "Gagal", text: "Lengkapi nama dan harga produk!", icon: "warning", customClass: { popup: 'rounded-4' } });
                return;
            }
            if (namaProdukLamaYangSedangDiedit !== "" && namaProdukLamaYangSedangDiedit !== nama) {
                delete masterProdukLokal[namaProdukLamaYangSedangDiedit];
            }

            masterProdukLokal[nama] = { harga: harga, stok: stok, barcode: barcode };
            simpanMasterKeFirebase(masterProdukLokal);

            Swal.fire({ title: "Berhasil!", text: "Data produk disinkronkan ke Cloud.", icon: "success", timer: 1000, showConfirmButton: false, customClass: { popup: 'rounded-4' } });
            window.batalEditMasterProduk();
        };

        window.hapusMasterProduk = function (namaKey) {
            Swal.fire({
                title: "Hapus?",
                text: `Hapus "${namaKey}" dari Cloud database?`,
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#d33",
                confirmButtonText: "Ya, Hapus!",
                cancelButtonText: "Batal",
                customClass: { popup: 'rounded-4' }
            }).then((result) => {
                if (result.isConfirmed) {
                    delete masterProdukLokal[namaKey];
                    simpanMasterKeFirebase(masterProdukLokal);
                    Swal.fire({ title: "Terhapus!", text: `Produk "${namaKey}" berhasil dihapus.`, icon: "success", timer: 1200, showConfirmButton: false, customClass: { popup: 'rounded-4' } });
                    window.batalEditMasterProduk();
                }
            });
        };

        // FUNGSI UTAMA UNTUK MEMANGGIL FILE FOOTER.HTML SECARA OTOMATIS DAN MENAMPILKANNYA DI WADAH
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('wadah-footer-global').innerHTML = data;
            })
            .catch(error => console.error('Gagal memuat footer:', error));
    </script>
</body>

</html>
