<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Daftar Produk & Harga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=barcode_reader" />

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #374151;
        }
        .container-box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 900px;
        }
        .header-title {
            color: #1e40af;
            font-weight: 700;
            border-bottom: 3px solid #3b82f6;
            padding-bottom: 10px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .form-label {
            font-weight: 600;
            color: #4b5563;
        }
        .btn-custom {
            border-radius: 8px;
            font-weight: 600;
            padding: 10px 20px;
        }
        .table-container {
            margin-top: 30px;
            overflow-x: auto;
        }
        .table img {
            width: 35px;
            height: 35px;
            object-fit: cover;
            border-radius: 6px;
        }
        .badge-stok {
            font-size: 0.85rem;
            padding: 6px 10px;
            border-radius: 6px;
        }
        .footer-info {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <script src="firebase-config.js"></script>
    <script src="script.js"></script>

    <div class="container-box">
        <div class="header-title">
            <span>⚙️ Atur Master Produk & Stok</span>
            <a href="index.html" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1">🔙 Kembali ke Kasir</a>
        </div>

        <form id="formMasterProduk" autocomplete="off">
            <input type="hidden" id="editOldKey" value="">
            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <label class="form-label">Nama Produk Baru / Edit</label>
                    <input type="text" id="masterNama" class="form-control" placeholder="Misal: ABC Kopi Klepon" required>
                </div>
                <div class="col-12 col-md-3">
                    <label class="form-label">Harga Jual (Rp)</label>
                    <div class="input-group">
                        <span class="input-group-text">Rp</span>
                        <input type="text" id="masterHargaTampilan" inputmode="numeric" class="form-control" placeholder="0" required>
                    </div>
                </div>
                <div class="col-12 col-md-2">
                    <label class="form-label">Stok Awal</label>
                    <input type="number" id="masterStok" class="form-control" placeholder="0" min="0" required>
                </div>
                <div class="col-12 col-md-3">
                    <label class="form-label">Kode Barcode (Opsional)</label>
                    <div class="input-group">
                        <input type="text" id="masterBarcode" class="form-control" placeholder="Nomor barcode...">
                        <a href="scan.html" class="btn btn-primary d-flex align-items-center" title="Scan Barcode Pake Kamera"><span class="material-symbols-outlined">barcode_reader</span></a>
                    </div>
                </div>
            </div>
            <div class="mt-4 text-end">
                <button type="button" id="btnBatalEditMaster" class="btn btn-secondary btn-custom me-2 d-none" onclick="batalEditMasterProduk()">❌ Batal</button>
                <button type="submit" id="btnSimpanMaster" class="btn btn-success btn-custom">🚀 Simpan Data Produk</button>
            </div>
        </form>

        <div class="table-container">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <h5 class="m-0 fw-bold text-secondary">📋 Daftar Seluruh Produk Cloud</h5>
                <div style="max-width: 300px; width: 100%;">
                    <input type="text" id="inputCariTabel" class="form-control form-control-sm" placeholder="🔍 Cari nama atau barcode..." oninput="saringTabelProdukSeketika(this.value)">
                </div>
            </div>
            <table class="table table-hover align-middle border">
                <thead class="table-light">
                    <tr>
                        <th style="width: 40%;">Nama Produk</th>
                        <th style="width: 20%;">Harga</th>
                        <th style="width: 15%; text-align: center;">Stok</th>
                        <th style="width: 25%; text-align: center;">Aksi Pengaturan</th>
                    </tr>
                </thead>
                <tbody id="bodyTabelMaster">
                    <tr>
                        <td colspan="4" class="text-center text-muted py-4">Memuat data produk dari Cloud Firebase...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="footer-info">
            <p class="m-0">© 2026 Web Cashier • Cloud Master Synchronizer</p>
        </div>
    </div>

    <script>
        let currentUser = null;
        let masterProdukLokal = {};
        let namaProdukLamaYangSedangDiedit = "";

        let hargaMasterAsli = 0;
        const inputMasterHargaTampilan = document.getElementById('masterHargaTampilan');
        
        inputMasterHargaTampilan.addEventListener('input', function (e) {
            let nilaiBersih = e.target.value.replace(/\D/g, "");
            hargaMasterAsli = Number(nilaiBersih) || 0;
            e.target.value = formatRupiah(nilaiBersih);
        });

        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                hubungkanKeMasterProdukFirebase();
            }
        });

        function hubungkanKeMasterProdukFirebase() {
            database.ref(`kasir_users/${currentUser.uid}/master_produk`).on('value', (snapshot) => {
                masterProdukLokal = snapshot.val() || {};
                renderTabelMasterProduk(masterProdukLokal);
                
                const urlParams = new URLSearchParams(window.location.search);
                const barcodeKirim = urlParams.get('barcode');
                if (barcodeKirim) {
                    document.getElementById('masterBarcode').value = barcodeKirim;
                    window.history.replaceState({}, document.title, window.location.pathname);
                    
                    let ditemukan = false;
                    for (let nama in masterProdukLokal) {
                        if (masterProdukLokal[nama].barcode && masterProdukLokal[nama].barcode === barcodeKirim) {
                            window.siapkanEditMasterProduk(nama);
                            ditemukan = true; break;
                        }
                    }
                    if(!ditemukan) {
                        document.getElementById('masterNama').focus();
                    }
                }
            });
        }

        function simpanMasterKeFirebase(data) {
            if (currentUser) {
                database.ref(`kasir_users/${currentUser.uid}/master_produk`).set(data);
            }
        }

        function renderTabelMasterProduk(dataObj) {
            const tbody = document.getElementById('bodyTabelMaster');
            tbody.innerHTML = '';

            const keys = Object.keys(dataObj);
            if (keys.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">Belum ada produk terdaftar. Silakan tambah di atas!</td></tr>`;
                return;
            }

            keys.forEach((nama) => {
                const item = dataObj[nama];
                const barcodeText = item.barcode ? `<br><small class="text-muted text-break">🆔 ${item.barcode}</small>` : '';
                
                let kelasBadge = "bg-success text-white";
                if (item.stok === 0) kelasBadge = "bg-danger text-white";
                else if (item.stok <= 5) kelasBadge = "bg-warning text-dark";

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="fw-bold text-dark text-wrap">${nama}</div>
                        ${barcodeText}
                    </td>
                    <td class="fw-semibold text-secondary">Rp ${formatRupiah(item.harga)}</td>
                    <td class="text-center"><span class="badge badge-stok ${kelasBadge}">${item.stok} Pcs</span></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-warning fw-bold text-dark px-2 me-1 mb-1" onclick="window.siapkanEditMasterProduk('${nama.replace(/'/g, "\\'")}')">📝 Edit</button>
                        <button class="btn btn-sm btn-danger fw-bold px-2 mb-1" onclick="window.hapusMasterProduk('${nama.replace(/'/g, "\\'")}')">🗑️ Hapus</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Jalankan ulang filter pencarian jika kolom cari sedang ada isinya saat data me-refresh
            saringTabelProdukSeketika(document.getElementById('inputCariTabel').value);
        }

        // REVISI LIVE SEARCH UTAMA: MENGGUNAKAN PENCARIAN SAMAR FUZZY MATCH KARAKTER ACAK AGAR COCOK HINGGA SINGKATAN SEPERTI "klpn" ATAU "idmlk"
        window.saringTabelProdukSeketika = function(kataKunci) {
            const tbody = document.getElementById('bodyTabelMaster');
            const baris = tbody.getElementsByTagName('tr');
            const bersih = kataKunci.trim();

            if (baris.length === 0 || baris[0].cells.length === 1) return;

            if (bersih === "") {
                for (let i = 0; i < baris.length; i++) {
                    baris[i].style.display = "";
                }
                return;
            }

            // Memecah setiap huruf ketikan menjadi regex fuzzy berurutan (Misal: "klpn" -> /k.*l.*p.*n/)
            const hurufKataKunci = bersih.toLowerCase().split("");
            const polaRegExFuzzy = new RegExp(hurufKataKunci.join(".*"));

            for (let i = 0; i < baris.length; i++) {
                // Mengambil seluruh teks di dalam baris pertama (Nama Produk & Barcode ID)
                const kolomTeks = baris[i].getElementsByTagName('td')[0];
                if (kolomTeks) {
                    const isiTeksLower = kolomTeks.textContent.toLowerCase();
                    
                    // Uji teks baris produk menggunakan ekspresi pencarian samar
                    if (polaRegExFuzzy.test(isiTeksLower)) {
                        baris[i].style.display = "";
                    } else {
                        baris[i].style.display = "none";
                    }
                }
            }
        };

        window.siapkanEditMasterProduk = function (nama) {
            if (!masterProdukLokal[nama]) return;
            const item = masterProdukLokal[nama];
            
            namaProdukLamaYangSedangDiedit = nama;
            document.getElementById('editOldKey').value = nama;
            document.getElementById('masterNama').value = nama;
            
            hargaMasterAsli = item.harga;
            inputMasterHargaTampilan.value = formatRupiah(item.harga);
            document.getElementById('masterStok').value = item.stok;
            document.getElementById('masterBarcode').value = item.barcode || "";

            document.getElementById('btnBatalEditMaster').classList.remove('d-none');
            document.getElementById('btnSimpanMaster').innerText = "💾 Simpan Perubahan";
            document.getElementById('btnSimpanMaster').className = "btn btn-warning btn-custom text-dark";
            document.getElementById('masterNama').focus();
        };

        window.batalEditMasterProduk = function () {
            namaProdukLamaYangSedangDiedit = "";
            document.getElementById('formMasterProduk').reset();
            document.getElementById('editOldKey').value = "";
            hargaMasterAsli = 0;
            
            document.getElementById('btnBatalEditMaster').classList.add('d-none');
            document.getElementById('btnSimpanMaster').innerText = "🚀 Simpan Data Produk";
            document.getElementById('btnSimpanMaster').className = "btn btn-success btn-custom";
        };

        document.getElementById('formMasterProduk').addEventListener('submit', function (e) {
            e.preventDefault();
            const nama = document.getElementById('masterNama').value.trim();
            const stok = Number(document.getElementById('masterStok').value) || 0;
            const barcode = document.getElementById('masterBarcode').value.trim();
            const harga = hargaMasterAsli;

            if (namaProdukLamaYangSedangDiedit !== "" && namaProdukLamaYangSedangDiedit !== nama) {
                delete masterProdukLokal[namaProdukLamaYangSedangDiedit];
            }

            masterProdukLokal[nama] = { harga: harga, stok: stok, barcode: barcode };
            simpanMasterKeFirebase(masterProdukLokal);
            
            Swal.fire({ title: "Berhasil!", text: "Data produk disinkronkan ke Cloud.", icon: "success", timer: 1000, showConfirmButton: false, customClass: { popup: 'rounded-4' } });
            window.batalEditMasterProduk();
        });

        window.hapusMasterProduk = function (namaKey) {
            Swal.fire({ 
                title: "Hapus?", 
                text: `Hapus "${namaKey}" dari Cloud database?`, 
                icon: "warning", 
                showCancelButton: true, 
                confirmButtonColor: "#d33", 
                confirmButtonText: "Ya, Hapus!", 
                cancelButtonText: "Batal", 
                customClass: { popup: 'rounded-4' } 
            }).then((result) => {
                if (result.isConfirmed) {
                    delete masterProdukLokal[namaKey];
                    simpanMasterKeFirebase(masterProdukLokal);
                    Swal.fire({ title: "Terhapus!", text: `Produk "${namaKey}" berhasil dihapus.`, icon: "success", timer: 1200, showConfirmButton: false, customClass: { popup: 'rounded-4' } });
                }
            });
        };
    </script>
</body>
</html>
