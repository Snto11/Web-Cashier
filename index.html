        auth.onAuthStateChanged((user) => {
            // Aplikasi tetap ditampilkan baik user sudah login maupun belum
            document.getElementById('appContainer').classList.remove('d-none');

            if (user) {
                currentUser = user;
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('userPhoto').src = user.photoURL || "https://via.placeholder.com/40";
                hubungkanKeRealtimeDatabase();
            } else {
                currentUser = null;
                document.getElementById('userName').innerText = "Tamu (Belum Login)";
                document.getElementById('userEmail').innerText = "Klik untuk login";

    <script>
        let masterProdukLokal = {};
        let dataPenjualanLokal = [];
        let antreanKeranjangSeketika = [];

        try {
            const cadanganKeranjang = sessionStorage.getItem('cadangan_keranjang_kasir');
            if (cadanganKeranjang) antreanKeranjangSeketika = JSON.parse(cadanganKeranjang);
        } catch (e) {
            antreanKeranjangSeketika = [];
        }

        function hubungkanKeRealtimeDatabase() {
            const uid = currentUser.uid;
            database.ref(`kasir_users/${uid}/master_produk`).on('value', (snapshot) => {
                masterProdukLokal = snapshot.val() || {};

                const urlParams = new URLSearchParams(window.location.search);
                const namaKirim = urlParams.get('nama');
                if (namaKirim) {
                    document.getElementById('namaBarang').value = namaKirim;
                    autoFillHarga();
                    window.history.replaceState({}, document.title, window.location.pathname);
                }

                if (antreanKeranjangSeketika.length > 0) {
                    document.getElementById('infoMultiBarang').classList.remove('d-none');
                    document.getElementById('labelSubtotal').innerText = "Subtotal (Barang Terakhir):";
                    document.getElementById('infoMultiBarang').querySelector('span:first-child').innerText = `Total Gabungan (${antreanKeranjangSeketika.length} Barang):`;
                    perbaruiTampilanRincian();
                    hitungKalkulatorSeketika();
                    normalisaiTombolSimpan();
                    aturTampilanInputPembayaran();
                }
            });
            database.ref(`kasir_users/${uid}/riwayat_penjualan`).on('value', (snapshot) => {
                dataPenjualanLokal = snapshot.val() || [];
            });
        }

        function simpanMasterKeFirebase(dataBaru) {
            if (currentUser) database.ref(`kasir_users/${currentUser.uid}/master_produk`).set(dataBaru);
        }

        function simpanRiwayatKeFirebase(dataBaru) {
            if (currentUser) database.ref(`kasir_users/${currentUser.uid}/riwayat_penjualan`).set(dataBaru);
        }

        const inputHargaTampilan = document.getElementById('hargaTampilan');
        const inputUangDiterimaTampilan = document.getElementById('uangDiterimaTampilan');

        let hargaAsli = 0;
        let uangDiterimaAsli = 0;

        window.toggleTanpaNamaBarang = function () {
            const checkTanpaNama = document.getElementById('checkTanpaNama');
            const inputNama = document.getElementById('namaBarang');
            const inputHarga = document.getElementById('hargaTampilan');

            if (checkTanpaNama.checked) {
                inputNama.value = "";
                inputNama.disabled = true;
                inputNama.required = false;
                inputNama.readOnly = false;
                inputHarga.readOnly = false;
                document.getElementById('infoStokTersedia').innerText = "";
                document.getElementById('jumlahPembelian').disabled = false;
                document.getElementById('jumlahPembelian').type = "number";
                normalisaiTombolSimpan();
                sembunyikanDropdownKustom();
                document.getElementById('hargaTampilan').focus();
            } else {
                inputNama.disabled = false;
                inputNama.required = true;
                normalisaiTombolSimpan();
            }
            aturVisibilitasTombolSimpan();
        }

        inputHargaTampilan.addEventListener('input', function (e) {
            let nilaiBersih = e.target.value.replace(/\D/g, "");
            hargaAsli = Number(nilaiBersih) || 0;
            e.target.value = formatRupiah(nilaiBersih);

            const inputQty = document.getElementById('jumlahPembelian');
            if (hargaAsli > 0) {
                if (!inputQty.value || inputQty.value === "0" || inputQty.value === "") {
                    inputQty.value = "1";
                }
            } else {
                inputQty.value = "";
            }

            hitungKalkulatorSeketika();
        });

        document.getElementById('jumlahPembelian').addEventListener('input', function () {

        function normalisaiTombolSimpan() {
            const btnSimpan = document.getElementById('btnSimpan');
            const idData = document.getElementById('rowId').value;
            const checkTanpaNama = document.getElementById('checkTanpaNama');

            // Ambil nilai ketiga inputan
            const namaVal = document.getElementById('namaBarang').value.trim();
            const hargaVal = document.getElementById('hargaTampilan').value.trim();
            const jumlahVal = document.getElementById('jumlahPembelian').value.trim();

            // 1. Atur teks & tampilan warna tombol sesuai kondisi
            if (idData !== "") {
                btnSimpan.innerHTML = '<span class="material-symbols-outlined me-1">save</span> Simpan Perubahan';
                btnSimpan.className = "btn btn-warning btn-lg w-100 fw-bold shadow-sm";
            } else if (antreanKeranjangSeketika.length > 0) {
                btnSimpan.innerHTML = '<span class="material-symbols-outlined me-1">add</span> Tambah ke Antrean';
                btnSimpan.className = "btn btn-outline-primary btn-lg w-100 fw-bold shadow-sm";
            } else {
                btnSimpan.innerHTML = '<span class="material-symbols-outlined me-1">save</span> Simpan ke Antrean';
                btnSimpan.className = "btn btn-primary btn-lg w-100 fw-bold shadow-sm";
            }

            // 2. LOGIKA PENYEMBUNYIAN TOMBOL (Skenario Baru)
            let harusMuncul = false;

            if (checkTanpaNama.checked) {
                // Jika "Tanpa Nama Barang" DICENTANG:
                // Tombol hanya muncul jika Harga DAN Jumlah Pembelian KEDUA-DUANYA TERISI
                if (hargaVal !== "" && jumlahVal !== "") {
                    harusMuncul = true;
                }
            } else {
                // Jika "Tanpa Nama Barang" TIDAK dicentang (Normal):
                // Tombol muncul jika setidaknya ada salah satu input yang terisi
                if (namaVal !== "" || hargaVal !== "" || jumlahVal !== "") {
                    harusMuncul = true;
                }
            }

            // 3. Tampilkan atau sembunyikan tombol
            if (harusMuncul) {
                btnSimpan.classList.remove('d-none');
            } else {
                btnSimpan.classList.add('d-none');
            }

            btnSimpan.disabled = false;
        }

            let nilaiBersih = e.target.value.replace(/\D/g, "");
            uangDiterimaAsli = Number(nilaiBersih) || 0;
            e.target.value = formatRupiah(nilaiBersih);
            hitungKalkulatorSeketika();

        function hitungKalkulatorSeketika() {
            const jumlah = Number(document.getElementById('jumlahPembelian').value) || 0;
            const subtotalBarangIni = hargaAsli * jumlah;
            document.getElementById('textSubtotalSeketika').innerText = "Rp " + formatRupiah(subtotalBarangIni);

            let totalSeluruhBelanja = subtotalBarangIni;
            antreanKeranjangSeketika.forEach(item => {
                totalSeluruhBelanja += (item.hargaBarang * item.jumlahPembelian);
            });

            if (antreanKeranjangSeketika.length > 0) {
                document.getElementById('textTotalGabungan').innerText = "Rp " + formatRupiah(totalSeluruhBelanja);
            }

            const btnSelesai = document.getElementById('btnSelesaiMulti');
            const boxSplit = document.getElementById('boxSplitPembayaran');
            const checkSplitTF = document.getElementById('checkSplitTF');
            const jenisBayar = document.getElementById('jenisPembayaran').value;

            if (jenisBayar !== "Cash") return;

            if (inputUangDiterimaTampilan.value.trim() !== "") {
                const kembalian = uangDiterimaAsli - totalSeluruhBelanja;
                document.getElementById('textKembalianSeketika').innerText = "Rp " + formatRupiah(kembalian);

                if (kembalian >= 0) {
                    document.getElementById('textKembalianSeketika').className = "fs-5 fw-bold text-success";
                    boxSplit.classList.add('d-none');
                    checkSplitTF.checked = false;

                    btnSelesai.disabled = false;
                    btnSelesai.className = "btn btn-success btn-lg w-100 fw-bold shadow-sm mt-2";
                    btnSelesai.classList.remove('d-none');
                } else {
                    document.getElementById('textKembalianSeketika').className = "fs-5 fw-bold text-danger";
                    boxSplit.classList.remove('d-none');

                    if (checkSplitTF.checked) {
                        btnSelesai.disabled = false;
                        btnSelesai.className = "btn btn-success btn-lg w-100 fw-bold shadow-sm mt-2";
                        btnSelesai.classList.remove('d-none');
                    } else {
                        btnSelesai.disabled = true;
                        btnSelesai.classList.add('d-none');
                    }
                }
            } else {
                document.getElementById('textKembalianSeketika').innerText = "Rp 0";
                document.getElementById('textKembalianSeketika').className = "fs-5 fw-bold text-danger";
                boxSplit.classList.add('d-none');
                checkSplitTF.checked = false;

                btnSelesai.disabled = true;
                btnSelesai.classList.add('d-none');
            }
        }

        function selesaikanTransactionsGabungan() {
            if (antreanKeranjangSeketika.length === 0) return;
            // PELEPASAN / PENGECEKAN LOGIN SEBELUM MENYIMPAN TRANSAKSI KE FIREBASE
            if (!currentUser) {
                Swal.fire({
                    title: "Login Diperlukan",
                    text: "Anda harus login dengan Google terlebih dahulu untuk menyelesaikan dan menyimpan transaksi ini!",
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonText: "🔑 Login Sekarang",
                    cancelButtonText: "Batal",
                    customClass: { popup: 'rounded-4' }
                }).then((result) => {
                    if (result.isConfirmed) {
                        // Arahkan pengguna ke halaman login.html
                        // Catatan: Rincian belanjaan aman disimpan di sessionStorage
                        window.location.href = 'login.html';
                    }
                });
                return; // Hentikan eksekusi transaksi
            }

            let jenisBayar = document.getElementById('jenisPembayaran').value;
            const checkSplitTF = document.getElementById('checkSplitTF');

            if (!jenisBayar && !checkSplitTF.checked) {
                Swal.fire({ title: "Metode Belum Dipilih", text: "Pilih Jenis Pembayaran sebelum menyimpan!", icon: "info", customClass: { popup: 'rounded-4' } });
                document.getElementById('jenisPembayaran').focus(); return;
            }

            let totalBelanja = 0;
            antreanKeranjangSeketika.forEach(item => totalBelanja += (item.hargaBarang * item.jumlahPembelian));

            const opsiTanggal = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            const stringWaktuSekarang = new Date().toLocaleDateString('id-ID', opsiTanggal);

            antreanKeranjangSeketika.forEach(item => {
                if (masterProdukLokal.hasOwnProperty(item.namaBarang)) {
                    masterProdukLokal[item.namaBarang].stok = Math.max(0, masterProdukLokal[item.namaBarang].stok - item.jumlahPembelian);
                }

                const totalItemIni = item.hargaBarang * item.jumlahPembelian;
                let nominalCashPencatatan = 0; let nominalTfPencatatan = 0; let teksMetodeKolom = "";

                if (checkSplitTF.checked && uangDiterimaAsli < totalBelanja && uangDiterimaAsli > 0) {
                    let proporsi = totalItemIni / totalBelanja;
                    nominalCashPencatatan = Math.round(uangDiterimaAsli * proporsi);
                    nominalTfPencatatan = totalItemIni - nominalCashPencatatan;
                    teksMetodeKolom = `💵${formatRupiah(nominalCashPencatatan)} + 📱${formatRupiah(nominalTfPencatatan)}`;
                } else {
                    nominalCashPencatatan = jenisBayar === "Cash" ? totalItemIni : 0;
                    nominalTfPencatatan = jenisBayar === "TF" ? totalItemIni : 0;
                    teksMetodeKolom = jenisBayar;
                }

                dataPenjualanLokal.push({
                    namaBarang: item.namaBarang,
                    hargaBarang: item.hargaBarang,
                    Platform: "Web",
                    jumlahPembelian: item.jumlahPembelian,
                    dibayarCash: nominalCashPencatatan,
                    dibayarTF: nominalTfPencatatan,
                    jenisPembayaran: teksMetodeKolom,
                    waktuTransaksi: stringWaktuSekarang
                });
            });

            simpanMasterKeFirebase(masterProdukLokal);
            simpanRiwayatKeFirebase(dataPenjualanLokal);
            Swal.fire({ title: "Transaksi Sukses! 🎉", text: "Data disinkronkan ke Firebase.", icon: "success", timer: 2000, showConfirmButton: false });

            antreanKeranjangSeketika = [];
            sessionStorage.removeItem('cadangan_keranjang_kasir');
            resetForm(true);
        }

            aturVisibilitasHapusUang();

        function resetForm(forceUncheckMaster = false) {
            const checkTanpaNama = document.getElementById('checkTanpaNama');
            const statusCentangSaatIni = checkTanpaNama.checked;

            document.getElementById('formPenjualan').reset();
            document.getElementById('rowId').value = "";

            document.getElementById('formTitle').className = "m-0 fw-bold text-primary";
            document.getElementById('btnBatal').classList.add('d-none');
            document.getElementById('infoStokTersedia').innerText = "";
            hargaAsli = 0; uangDiterimaAsli = 0; antreanKeranjangSeketika = [];
            sessionStorage.removeItem('cadangan_keranjang_kasir');

            if (forceUncheckMaster) checkTanpaNama.checked = false;
            else checkTanpaNama.checked = statusCentangSaatIni;

            if (checkTanpaNama.checked) {
                document.getElementById('namaBarang').disabled = true;
                document.getElementById('namaBarang').required = false;
            } else {
                document.getElementById('namaBarang').disabled = false;
                document.getElementById('namaBarang').required = true;
            }

            document.getElementById('namaBarang').readOnly = false;
            inputHargaTampilan.readOnly = false;
            document.getElementById('infoMultiBarang').classList.add('d-none');

            perbaruiTampilanRincian(); document.getElementById('textSubtotalSeketika').innerText = "Rp 0"; document.getElementById('textKembalianSeketika').innerText = "Rp 0";
            normalisaiTombolSimpan(); aturTampilanInputPembayaran(); sembunyikanDropdownKustom();
            aturVisibilitasTombolHapus();
            aturVisibilitasHapusUang();
            aturVisibilitasTombolSimpan()
            aturVisibilitasTombolHargaRibuan();
        }

        function aturTampilanInputPembayaran() {
            const jenisBayar = document.getElementById('jenisPembayaran').value;
            const areaInputCash = document.getElementById('areaInputCash');
            const btnSelesai = document.getElementById('btnSelesaiMulti');
            const boxJenisPembayaran = document.getElementById('boxJenisPembayaran');

            boxJenisPembayaran.style.display = antreanKeranjangSeketika.length === 0 ? 'none' : 'block';

            if (antreanKeranjangSeketika.length === 0 || jenisBayar === "") {
                areaInputCash.style.display = 'none';
                btnSelesai.classList.add('d-none');
                return;
            }

            areaInputCash.style.display = jenisBayar === "Cash" ? 'block' : 'none';
            if (jenisBayar === "Cash") {
                hitungKalkulatorSeketika();
            } else if (jenisBayar === "TF") {
                btnSelesai.disabled = false;
                btnSelesai.className = "btn btn-success btn-lg w-100 fw-bold shadow-sm mt-2";
                btnSelesai.classList.remove('d-none');
            } else {
                btnSelesai.disabled = true;
                btnSelesai.className = "btn btn-secondary btn-lg w-100 fw-bold shadow-sm mt-2 opacity-50";
                btnSelesai.classList.remove('d-none');
            }
        }

        window.aturPenyaringanRekomendasiSeketika = function (kataKunci) {
            if (document.getElementById('checkTanpaNama').checked) return;

            const dropdown = document.getElementById('dropdownRekomendasi');
            const bersih = kataKunci.trim();

            if (bersih === "") {
                sembunyikanDropdownKustom();
                return;
            }

            const apakahBarcode = /^\d+$/.test(bersih);
            dropdown.innerHTML = '';
            let adaData = false;

            if (apakahBarcode) {
                // PERBAIKAN: Mencari produk yang barcode-nya mengandung/mirip dengan angka yang sedang diketik
                for (let nama in masterProdukLokal) {
                    if (masterProdukLokal[nama].barcode && String(masterProdukLokal[nama].barcode).includes(bersih)) {
                        const divItem = document.createElement('div');
                        divItem.className = 'item-rekomendasi-kustom';
                        // Menampilkan Nama Barang meskipun yang diketik adalah Barcode
                        divItem.innerText = `${nama} (${masterProdukLokal[nama].barcode})`;
                        divItem.onclick = function () {
                            pilihBarangDariDropdownKustom(nama);
                        };
                        dropdown.appendChild(divItem);
                        adaData = true;
                    }
                }
            } else {
                const hurufKataKunci = bersih.toLowerCase().split("");
                const polaRegExFuzzy = new RegExp(hurufKataKunci.join(".*"));

                for (let nama in masterProdukLokal) {
                    const namaProdukLower = nama.toLowerCase();

                    if (polaRegExFuzzy.test(namaProdukLower)) {
                        const divItem = document.createElement('div');
                        divItem.className = 'item-rekomendasi-kustom';
                        divItem.innerText = nama;
                        divItem.onclick = function () {
                            pilihBarangDariDropdownKustom(nama);
                        };
                        dropdown.appendChild(divItem);
                        adaData = true;
                    }
                }
            }

            if (adaData) {
                dropdown.style.display = 'block';
            } else {
                sembunyikanDropdownKustom();
            }
        }

        window.aturPenyaringanRekomendasiSeketika__ = function (kataKunci) {

        function pilihBarangDariDropdownKustom(namaBarang) {
            const inputNama = document.getElementById('namaBarang');
            inputNama.value = namaBarang;
            sembunyikanDropdownKustom();
            autoFillHarga();
        }

        function sembunyikanDropdownKustom() {
            document.getElementById('dropdownRekomendasi').style.display = 'none';
        }

        document.addEventListener('click', function (e) {
            if (!e.target.closest('.wrapper-rekomendasi-kasir')) {
                sembunyikanDropdownKustom();
            }
        });

        function autoFillHarga() {
            if (document.getElementById('checkTanpaNama').checked) return;
            const inputNama = document.getElementById('namaBarang');
            let namaInputVal = inputNama.value.trim();
            const inputHarga = document.getElementById('hargaTampilan');

            let produkDitemukan = null;

            // 1. Cek apakah input COCOK PAS dengan Nama Produk
            if (masterProdukLokal.hasOwnProperty(namaInputVal)) {
                produkDitemukan = masterProdukLokal[namaInputVal];
            } else {
                // 2. Cek apakah input COCOK PAS dengan Nomor Barcode secara utuh
                for (let nama in masterProdukLokal) {
                    if (masterProdukLokal[nama].barcode && String(masterProdukLokal[nama].barcode) === namaInputVal) {
                        produkDitemukan = masterProdukLokal[nama];
                        inputNama.value = nama; // PERBAIKAN: Langsung ubah isi input dari nomor barcode menjadi Nama Barang
                        break;
                    }
                }
            }

            if (produkDitemukan) {
                hargaAsli = produkDitemukan.harga;
                inputHarga.value = formatRupiah(String(produkDitemukan.harga));
                document.getElementById('infoStokTersedia').innerText = `(Tersedia: ${produkDitemukan.stok} Pcs)`;
                inputNama.readOnly = true;
                inputHarga.readOnly = true;
                document.getElementById('jumlahPembelian').value = "1";
                hitungKalkulatorSeketika();
                sembunyikanDropdownKustom();
                aturVisibilitasTombolHapus();
                aturVisibilitasTombolSimpan()
                aturVisibilitasTombolHargaRibuan();
            }
        }

        // Fungsi untuk mengecek kondisi inputan dan menampilkan/menyembunyikan tombol 🗑️
        function aturVisibilitasTombolHapus() {
            const namaVal = document.getElementById('namaBarang').value.trim();
            const hargaVal = document.getElementById('hargaTampilan').value.trim();
            const jumlahVal = document.getElementById('jumlahPembelian').value.trim();
            const btnHapus = document.getElementById('btnHapusInput');

            // Jika setidaknya ada salah satu input yang terisi
            if (namaVal !== "" || hargaVal !== "" || jumlahVal !== "") {
                btnHapus.classList.remove('d-none');
            } else {
                btnHapus.classList.add('d-none');
            }
        }

        // 1. Fungsi untuk mengecek isi input dan mengatur sembunyi/munculnya tombol
        function aturVisibilitasHapusUang() {
            const inputUang = document.getElementById('uangDiterimaTampilan');
            const btnHapusUang = document.getElementById('btnHapusUangDiterima');

            if (inputUang.value.trim() !== "") {
                btnHapusUang.classList.remove('d-none'); // Munculkan tombol
            } else {
                btnHapusUang.classList.add('d-none');    // Sembunyikan tombol
            }
        }

        // 2. Fungsi saat tombol 🗑️ diklik
        function hapusUangDiterima() {
            const inputUang = document.getElementById('uangDiterimaTampilan');
            inputUang.value = "";
            uangDiterimaAsli = 0;

            // Matikan centang Uang Pas jika sedang aktif
            const chkUangPas = document.getElementById('checkUangPas');
            if (chkUangPas) chkUangPas.checked = false;
            inputUang.readOnly = false;

            hitungKalkulatorSeketika();
            aturVisibilitasHapusUang();
            inputUang.focus();
        }

        // Fungsi untuk menambahkan "000" di belakang inputan Uang Diterima
        function tambahRibuanUangDiterima() {
            const inputUang = document.getElementById('uangDiterimaTampilan');

            // Ambil hanya karakter angka dari inputan saat ini
            let nilaiBersih = inputUang.value.replace(/\D/g, "");

            // Jika pengguna sudah menginput angka
            if (nilaiBersih !== "") {
                nilaiBersih = nilaiBersih + "000"; // Tambahkan "000"
                uangDiterimaAsli = Number(nilaiBersih) || 0;

                // Format ulang ke tampilan Rupiah
                inputUang.value = formatRupiah(nilaiBersih);

                // Jalankan kalkulator & perbarui tombol hapus
                hitungKalkulatorSeketika();
                aturVisibilitasHapusUang();
                inputUang.focus();
            }
        }

        // 3. Pasang Event Listener agar tombol merespons inputan pengguna secara real-time
        document.getElementById('uangDiterimaTampilan').addEventListener('input', function () {
            aturVisibilitasHapusUang();
        });

        // Pasang Event Listener ke ketiga input agar fungsi berjalan setiap kali ada pengetikan/perubahan
        document.getElementById('namaBarang').addEventListener('input', aturVisibilitasTombolHapus);
        document.getElementById('hargaTampilan').addEventListener('input', aturVisibilitasTombolHapus);
        document.getElementById('jumlahPembelian').addEventListener('input', aturVisibilitasTombolHapus);

        function autoFillHarga__() {
            if (document.getElementById('checkTanpaNama').checked) return;
            const inputNama = document.getElementById('namaBarang');
            let namaInputVal = inputNama.value.trim();
            const inputHarga = document.getElementById('hargaTampilan');

            let produkDitemukan = null;
            if (masterProdukLokal.hasOwnProperty(namaInputVal)) {
                produkDitemukan = masterProdukLokal[namaInputVal];
            } else {
                for (let nama in masterProdukLokal) {
                    if (masterProdukLokal[nama].barcode && masterProdukLokal[nama].barcode === namaInputVal) {
                        produkDitemukan = masterProdukLokal[nama]; inputNama.value = nama; break;
                    }
                }
            }

            if (produkDitemukan) {
                hargaAsli = produkDitemukan.harga; inputHarga.value = formatRupiah(produkDitemukan.harga);
                document.getElementById('infoStokTersedia').innerText = `(Tersedia: ${produkDitemukan.stok} Pcs)`;
                inputNama.readOnly = true; inputHarga.readOnly = true;
                document.getElementById('jumlahPembelian').value = "1";
                hitungKalkulatorSeketika();
                sembunyikanDropdownKustom();
            }
        }

        // Pasang Event Listener ke ketiga input agar memicu pengecekan tombol Simpan & Hapus
        ['input', 'change'].forEach(eventType => {
            document.getElementById('namaBarang').addEventListener(eventType, function () {
                aturVisibilitasTombolHapus();
                aturVisibilitasTombolSimpan();
            });
            document.getElementById('hargaTampilan').addEventListener(eventType, function () {
                aturVisibilitasTombolHapus();
                aturVisibilitasTombolSimpan();
            });
            document.getElementById('jumlahPembelian').addEventListener(eventType, function () {
                aturVisibilitasTombolHapus();
                aturVisibilitasTombolSimpan();
            });
        });

        aturVisibilitasTombolSimpan();

        // SCRIPT TAMBAHAN UNTUK PENGAMBILAN FOOTER SECARA OTOMATIS
        fetch('footer.html')
            .then(response => {
                if (!response.ok) throw new Error('Gagal memuat file footer.');
                return response.text();
            })
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            })
            .catch(error => console.error('Error saat load footer:', error));

    </script>
