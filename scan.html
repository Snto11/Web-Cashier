<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR & Barcode Modern</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #374151;
        }
        .container-scanner {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .header-title {
            color: #1e40af;
            font-weight: 700;
            border-bottom: 3px solid #3b82f6;
            padding-bottom: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e5e7eb !important;
            background-color: #f9fafb;
        }
        #reader__dashboard_section_csr button {
            background-color: #3b82f6 !important;
            color: white !important;
            border: none !important;
            padding: 8px 16px !important;
            border-radius: 6px !important;
            font-weight: 600 !important;
            cursor: pointer !important;
        }
        #reader__dashboard_section_csr button:hover {
            background-color: #2563eb !important;
        }
        .result-box {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
            text-align: left;
        }
        .btn-custom {
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            padding: 10px;
        }
    </style>
</head>
<body>

    <script src="firebase-config.js"></script>
    <script src="script.js"></script>

    <div class="container-scanner">
        <div class="header-title">
            <span>📷 Pindai Barcode Master</span>
            <a href="db_produk.html" class="btn btn-outline-secondary btn-sm fw-bold">🔙 Batal</a>
        </div>

        <div id="reader"></div>

        <div class="result-box">
            <label class="form-label fw-bold text-secondary mb-1" style="font-size: 0.85rem;">Nomor Kode Barcode Terbaca:</label>
            <input type="text" id="scanBarcodeBarang" class="form-control font-semibold text-primary bg-white mb-3" placeholder="Arahkan kamera ke barcode produk..." readonly>
            
            <div id="boxTombolSimpan">
                <button class="btn btn-success btn-custom shadow-sm" onclick="kirimBarcodeKeMaster()">🚀 Gunakan Kode & Atur Produk</button>
            </div>
            
            <div id="boxNamaBarang" class="d-none mt-2">
                <label class="form-label fw-bold text-success mb-1" style="font-size: 0.85rem;">Tercatat Milik Barang:</label>
                <input type="text" id="resultNamaBarang" class="form-control form-control-sm fw-bold bg-white text-dark mb-1" readonly>
                <small class="text-warning d-block lh-sm fw-semibold" style="font-size: 0.75rem;">⚠️ Barcode ini sudah terdaftar. Melanjutkan akan otomatis membuka mode edit produk tersebut!</small>
            </div>
        </div>

        <div id="wadah-footer-global"></div>
    </div>

    <script>
        let currentUser = null;
        let masterProdukLokal = {};

        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                database.ref(`kasir_users/${user.uid}/master_produk`).on('value', (snapshot) => {
                    masterProdukLokal = snapshot.val() || {};
                });
            }
        });

        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('scanBarcodeBarang').value = decodedText;
            
            let namaProdukTerpilih = "";
            for (let nama in masterProdukLokal) {
                if (masterProdukLokal[nama].barcode && masterProdukLokal[nama].barcode === decodedText) {
                    namaProdukTerpilih = nama;
                    break;
                }
            }

            if (namaProdukTerpilih !== "") {
                document.getElementById('boxNamaBarang').classList.remove('d-none');
                document.getElementById('resultNamaBarang').value = namaProdukTerpilih;
                Swal.fire({ title: "Barcode Terdaftar! ✏️", text: `Milik produk: ${namaProdukTerpilih}`, icon: "info", customClass: { popup: 'rounded-4' } });
            } else {
                document.getElementById('boxNamaBarang').classList.add('d-none');
                document.getElementById('resultNamaBarang').value = "";
                Swal.fire({ title: "Terbaca! 🎉", text: `Kode: ${decodedText}`, icon: "success", timer: 1000, showConfirmButton: false, customClass: { popup: 'rounded-4' } });
            }
        }

        function onScanFailure(error) {}

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: { width: 250, height: 120 },
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            },
            false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        function resetFormScanner() {
            document.getElementById('scanBarcodeBarang').value = '';
            document.getElementById('boxTombolSimpan').classList.remove('d-none');
            document.getElementById('boxNamaBarang').classList.add('d-none');
            document.getElementById('resultNamaBarang').value = "";
        }

        function kirimBarcodeKeMaster() {
            const barcode = document.getElementById('scanBarcodeBarang').value.trim();
            if (!barcode) {
                Swal.fire({ title: "Scan Belum Ada", text: "Silakan lakukan pemindaian barcode produk terlebih dahulu!", icon: "warning", customClass: { popup: 'rounded-4' } });
                return;
            }
            window.location.href = `db_produk.html?scan_barcode=${encodeURIComponent(barcode)}`;
        }

        // PANGGIL COMPONENT FOOTER GLOBAL
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('wadah-footer-global').innerHTML = data;
            })
            .catch(error => console.error('Gagal memuat footer:', error));
    </script>
</body>
</html>
