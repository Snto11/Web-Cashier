<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR & Barcode Modern</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }
        .container-scanner {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }
        .container-tabel {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        h1, h2 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #1e3a8a;
            font-weight: bold;
        }
        p.subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: none !important;
            background: #fafafa;
        }
        #reader__dashboard_section_csr button {
            background-color: #1e3a8a !important;
            color: white !important;
            border-radius: 6px !important;
            padding: 6px 12px !important;
            border: none !important;
            font-size: 14px !important;
        }
        .sticky-thead {
            position: sticky;
            top: 0;
            background-color: #e9ecef;
            z-index: 1;
        }
    </style>
</head>
<body>

    <script src="firebase-config.js"></script>

    <script>
        let currentUser = null;
        let masterProdukLokal = {};
        let namaProdukLamaYangSedangDiedit = "";

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                database.ref(`kasir_users/${user.uid}/master_produk`).on('value', (snapshot) => {
                    masterProdukLokal = snapshot.val() || {};
                    muatTabelMasterLokal(); 
                });
            }
        });
    </script>

    <div class="container-scanner">
        <div class="text-center">
            <h1>📷 Pemindai Barcode Produk</h1>
            <p class="subtitle">Arahkan kamera ke barcode untuk mengisi kode secara otomatis</p>
        </div>

        <div id="reader" class="mb-4"></div>

        <div class="card p-3 bg-light border text-start shadow-sm" style="font-size: 0.9rem;">
            <label class="fw-bold text-secondary mb-2" id="labelInputMaster">➕ Tambah / Update Produk dari Scan:</label>
            
            <div class="mb-2">
                <label class="form-label small fw-semibold mb-1">Kode Barcode Terpindai</label>
                <div class="input-group input-group-sm">
                    <input type="text" id="scanBarcodeBarang" class="form-control fw-mono bg-white text-primary fw-bold" placeholder="Menunggu hasil scan kamera..." readonly>
                    <button class="btn btn-outline-secondary text-danger" type="button" onclick="document.getElementById('scanBarcodeBarang').value = '';" title="Kosongkan Barcode">🗑️</button>
                </div>
            </div>

            <div class="mb-2">
                <label class="form-label small fw-semibold mb-1">Nama Barang</label>
                <div class="input-group input-group-sm">
                    <input type="text" id="scanNamaBarang" class="form-control" placeholder="Masukkan nama barang">
                    <button class="btn btn-outline-secondary text-danger" type="button" onclick="document.getElementById('scanNamaBarang').value = '';" title="Kosongkan Nama">🗑️</button>
                </div>
            </div>

            <div class="mb-2">
                <label class="form-label small fw-semibold mb-1">Harga Satuan</label>
                <div class="input-group input-group-sm">
                    <span class="input-group-text">Rp</span>
                    <input type="text" id="scanHargaBarangTampilan" inputmode="numeric" class="form-control" placeholder="Harga Satuan">
                    <button class="btn btn-outline-secondary text-danger" type="button" onclick="document.getElementById('scanHargaBarangTampilan').value = '';" title="Kosongkan Harga">🗑️</button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-semibold mb-1">Jumlah Sisa Stok</label>
                <div class="input-group input-group-sm">
                    <input type="number" id="scanStokBarang" class="form-control" placeholder="Jumlah sisa stok">
                    <button class="btn btn-outline-secondary text-danger" type="button" onclick="document.getElementById('scanStokBarang').value = '';" title="Kosongkan Stok">🗑️</button>
                </div>
            </div>

            <div id="wadahTombolAksi">
                <div class="row g-2">
                    <div class="col-8">
                        <button class="btn btn-primary btn-sm w-100 fw-bold shadow-sm" onclick="simpanProdukDariScan()">💾 Simpan ke Sistem</button>
                    </div>
                    <div class="col-4">
                        <a href="index.html" class="btn btn-secondary btn-sm w-100 fw-bold shadow-sm">🔙 Kembali</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container-tabel">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="m-0">📋 Daftar Produk Terdaftar</h2>
        </div>
        <div class="mb-3">
            <input type="text" id="cariProdukScan" class="form-control form-control-sm" oninput="filterTabelMasterScan()" placeholder="🔍 Cari nama atau barcode...">
        </div>
        <div class="table-responsive border rounded" style="max-height: 250px; overflow-y: auto;">
            <table class="table table-sm table-hover text-center m-0" id="tabelMasterScan" style="font-size: 0.85rem;">
                <thead class="table-secondary sticky-thead small">
                    <tr>
                        <th>No</th>
                        <th>Nama Barang</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" class="text-muted py-2">Memuat daftar produk...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        document.getElementById('scanHargaBarangTampilan').addEventListener('input', function (e) {
            e.target.value = formatRupiah(e.target.value.replace(/\D/g, ""));
        });

        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('scanBarcodeBarang').value = decodedText;
            
            for (let nama in masterProdukLokal) {
                if (masterProdukLokal[nama].barcode && masterProdukLokal[nama].barcode === decodedText) {
                    isiFormMasterProduk(nama, masterProdukLokal[nama].harga, masterProdukLokal[nama].stok, decodedText);
                    break;
                }
            }
        }

        function onScanFailure(error) {}

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: { width: 250, height: 120 },
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            },
            false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        function muatTabelMasterLokal() {
            const tbody = document.querySelector('#tabelMasterScan tbody');
            if (!tbody) return;
            tbody.innerHTML = '';

            let nomorUrutMaster = 1;
            let adaData = false;

            for (let nama in masterProdukLokal) {
                adaData = true;
                let barcodeTampil = masterProdukLokal[nama].barcode ? `<br><small class="text-muted fw-mono" style="font-size: 0.72rem;">📋 ${masterProdukLokal[nama].barcode}</small>` : '';
                
                tbody.innerHTML += `
                    <tr class="produk-row-scan" data-nama="${nama.toLowerCase()}" data-barcode="${(masterProdukLokal[nama].barcode || '').toLowerCase()}">
                        <td class="text-muted fw-semibold small">${nomorUrutMaster++}</td>
                        <td class="text-start small"><span class="fw-bold">${nama}</span>${barcodeTampil}</td>
                        <td class="text-end small">Rp ${formatRupiah(masterProdukLokal[nama].harga)}</td>
                        <td class="text-center small fw-semibold text-primary">${masterProdukLokal[nama].stok} pcs</td>
                        <td>
                            <div class="d-flex flex-row justify-content-center align-items-center">
                                <button class="btn btn-warning btn-sm p-1 py-0 shadow-sm me-1" style="font-size: 0.75rem;" onclick="isiFormMasterProduk('${nama}', ${masterProdukLokal[nama].harga}, ${masterProdukLokal[nama].stok}, '${masterProdukLokal[nama].barcode || ''}')">✏️</button>
                                <button class="btn btn-danger btn-sm p-1 py-0 shadow-sm" style="font-size: 0.75rem;" onclick="hapusMasterProduk('${nama}')">🗑️</button>
                            </div>
                        </td>
                    </tr>`;
            }

            if (!adaData) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-muted py-2">Belum ada daftar produk.</td></tr>';
            }
        }

        window.isiFormMasterProduk = function (nama, harga, stok, barcode) {
            document.getElementById('scanNamaBarang').value = nama;
            document.getElementById('scanBarcodeBarang').value = barcode;
            document.getElementById('scanHargaBarangTampilan').value = formatRupiah(harga);
            document.getElementById('scanStokBarang').value = stok;
            namaProdukLamaYangSedangDiedit = nama;
            
            document.getElementById('labelInputMaster').innerText = "✏️ Edit Produk Terpilih:";
            document.getElementById('wadahTombolAksi').innerHTML = `
                <div class="row g-2">
                    <div class="col-8">
                        <button class="btn btn-warning btn-sm w-100 fw-bold shadow-sm" onclick="simpanProdukDariScan()">💾 Perbarui Data Produk</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-secondary btn-sm w-100 fw-bold shadow-sm" onclick="window.batalEditMasterProduk()">❌ Batal</button>
                    </div>
                </div>`;
        };

        window.batalEditMasterProduk = function () {
            namaProdukLamaYangSedangDiedit = "";
            document.getElementById('scanNamaBarang').value = "";
            document.getElementById('scanBarcodeBarang').value = "";
            document.getElementById('scanHargaBarangTampilan').value = "";
            document.getElementById('scanStokBarang').value = "";
            
            document.getElementById('labelInputMaster').innerText = "➕ Tambah / Update Produk dari Scan:";
            document.getElementById('wadahTombolAksi').innerHTML = `
                <div class="row g-2">
                    <div class="col-8">
                        <button class="btn btn-primary btn-sm w-100 fw-bold shadow-sm" onclick="simpanProdukDariScan()">💾 Simpan ke Sistem</button>
                    </div>
                    <div class="col-4">
                        <a href="index.html" class="btn btn-secondary btn-sm w-100 fw-bold shadow-sm">🔙 Kembali</a>
                    </div>
                </div>`;
        };

        function filterTabelMasterScan() {
            const kataKunci = document.getElementById('cariProdukScan').value.toLowerCase().trim();
            document.querySelectorAll('#tabelMasterScan tbody .produk-row-scan').forEach(row => {
                if (row.getAttribute('data-nama').includes(kataKunci) || row.getAttribute('data-barcode').includes(kataKunci)) {
                    row.style.setProperty('display', '', 'important');
                } else {
                    row.style.setProperty('display', 'none', 'important');
                }
            });
        }

        function simpanProdukDariScan() {
            const barcode = document.getElementById('scanBarcodeBarang').value.trim();
            const nama = document.getElementById('scanNamaBarang').value.trim();
            const harga = Number(document.getElementById('scanHargaBarangTampilan').value.replace(/\D/g, "")) || 0;
            const stok = Number(document.getElementById('scanStokBarang').value) || 0;

            if (!nama || harga <= 0) {
                Swal.fire({ title: "Data Belum Lengkap", text: "Nama barang dan harga satuan wajib diisi!", icon: "warning", customClass: { popup: 'rounded-4' } });
                return;
            }

            if (namaProdukLamaYangSedangDiedit !== "" && namaProdukLamaYangSedangDiedit !== nama) {
                delete masterProdukLokal[namaProdukLamaYangSedangDiedit];
            }

            masterProdukLokal[nama] = { harga: harga, stok: stok, barcode: barcode };

            if (currentUser) {
                database.ref(`kasir_users/${currentUser.uid}/master_produk`).set(masterProdukLokal)
                .then(() => {
                    Swal.fire({ title: "Berhasil Disimpan! 🎉", text: `Produk "${nama}" telah disinkronkan.`, icon: "success", timer: 1500, showConfirmButton: false, customClass: { popup: 'rounded-4' } });
                    window.batalEditMasterProduk();
                })
                .catch((error) => {
                    Swal.fire({ title: "Gagal Menyimpan", text: error.message, icon: "error" });
                });
            }
        }

        window.hapusMasterProduk = function (namaKey) {
            Swal.fire({
                title: "Hapus?",
                text: `Hapus "${namaKey}" dari Cloud?`,
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#d33",
                confirmButtonText: "Ya, Hapus!",
                cancelButtonText: "Batal",
                customClass: { popup: 'rounded-4' }
            }).then((result) => {
                if (result.isConfirmed) {
                    delete masterProdukLokal[namaKey];
                    if (currentUser) {
                        database.ref(`kasir_users/${currentUser.uid}/master_produk`).set(masterProdukLokal)
                        .then(() => {
                            Swal.fire({ title: "Terhapus!", text: `Produk "${namaKey}" berhasil dihapus.`, icon: "success", timer: 1500, showConfirmButton: false, customClass: { popup: 'rounded-4' } });
                            window.batalEditMasterProduk();
                        });
                    }
                }
            });
        };
    </script>
</body>
</html>
