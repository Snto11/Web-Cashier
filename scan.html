<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR & Barcode Modern</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }
        .container-scanner {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #1e3a8a;
            font-weight: bold;
        }
        p.subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: none !important;
            background: #fafafa;
        }
        #reader__dashboard_section_csr button {
            background-color: #1e3a8a !important;
            color: white !important;
            border-radius: 6px !important;
            padding: 6px 12px !important;
            border: none !important;
            font-size: 14px !important;
        }
    </style>
</head>
<body>

    <script src="firebase-config.js"></script>

    <script>
        let currentUser = null;
        let masterProdukLokal = {};

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                // Ambil data master produk kasir dari cloud database harian
                database.ref(`kasir_users/${user.uid}/master_produk`).on('value', (snapshot) => {
                    masterProdukLokal = snapshot.val() || {};
                });
            }
        });
    </script>

    <div class="container-scanner">
        <div class="text-center">
            <h1>📷 Pemindai Barcode Produk</h1>
            <p class="subtitle">Arahkan kamera ke barcode untuk mendaftarkan kode barang</p>
        </div>

        <div id="reader" class="mb-4"></div>

        <div class="card p-3 bg-light border text-start shadow-sm" style="font-size: 0.9rem;">
            <div class="mb-3">
                <label class="form-label small fw-semibold mb-1">Kode Barcode Terpindai</label>
                <div class="input-group input-group-sm">
                    <input type="text" id="scanBarcodeBarang" class="form-control fw-mono bg-white text-primary fw-bold" placeholder="Menunggu hasil scan kamera..." readonly>
                    <button class="btn btn-outline-secondary text-danger" type="button" onclick="document.getElementById('scanBarcodeBarang').value = '';" title="Kosongkan Barcode">🗑️</button>
                </div>
            </div>

            <div class="row g-2">
                <div class="col-8">
                    <button class="btn btn-primary btn-sm w-100 fw-bold shadow-sm" onclick="simpanBarcodeSaja()">💾 Simpan</button>
                </div>
                <div class="col-4">
                    <a href="index.html" class="btn btn-secondary btn-sm w-100 fw-bold shadow-sm">🔙 Kembali</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Handler Sukses Scan Barcode Kamera
        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('scanBarcodeBarang').value = decodedText;
            Swal.fire({ title: "Terbaca! 🎉", text: `Kode: ${decodedText}`, icon: "success", timer: 1000, showConfirmButton: false, customClass: { popup: 'rounded-4' } });
        }

        function onScanFailure(error) {
            // Pemindaian berlanjut mencari frame barcode secara real-time
        }

        // Jalankan Inisialisasi Scanner HTML5-QRCode
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: { width: 250, height: 120 },
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            },
            false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        // Fungsi Simpan Barcode Baru ke Cloud Firebase Realtime Database
        function simpanBarcodeSaja() {
            const barcode = document.getElementById('scanBarcodeBarang').value.trim();

            if (!barcode) {
                Swal.fire({ title: "Scan Belum Ada", text: "Silakan lakukan pemindaian barcode produk terlebih dahulu!", icon: "warning", customClass: { popup: 'rounded-4' } });
                return;
            }

            let namaKey = `Produk ${barcode}`;
            let hargaLama = 0;
            let stokLama = 0;

            // Cek apakah nomor barcode ini sebenarnya sudah terdaftar pada produk tertentu
            for (let nama in masterProdukLokal) {
                if (masterProdukLokal[nama].barcode && masterProdukLokal[nama].barcode === barcode) {
                    namaKey = nama; // Tetap gunakan nama barang yang sudah ada
                    hargaLama = masterProdukLokal[nama].harga || 0;
                    stokLama = masterProdukLokal[nama].stok || 0;
                    break;
                }
            }

            // Daftarkan / update komponen barcode ke database master lokal
            masterProdukLokal[namaKey] = { 
                harga: hargaLama, 
                stok: stokLama, 
                barcode: barcode 
            };

            // Kirim pembaruan data langsung ke Cloud Firebase kasir user
            if (currentUser) {
                database.ref(`kasir_users/${currentUser.uid}/master_produk`).set(masterProdukLokal)
                .then(() => {
                    Swal.fire({
                        title: "Berhasil Disimpan! 🎉",
                        text: `Barcode [${barcode}] telah terhubung ke data produk sistem.`,
                        icon: "success",
                        timer: 2000,
                        showConfirmButton: false,
                        customClass: { popup: 'rounded-4' }
                    }).then(() => {
                        // Bersihkan inputan setelah sukses simpan agar siap scan barang baru
                        document.getElementById('scanBarcodeBarang').value = "";
                    });
                })
                .catch((error) => {
                    Swal.fire({ title: "Gagal Menyimpan", text: error.message, icon: "error" });
                });
            }
        }
    </script>
</body>
</html>
