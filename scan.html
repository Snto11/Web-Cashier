<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR & Barcode Modern</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }
        .container-scanner {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #1e3a8a;
            font-weight: bold;
        }
        p.subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: none !important;
            background: #fafafa;
        }
        #reader__dashboard_section_csr button {
            background-color: #1e3a8a !important;
            color: white !important;
            border-radius: 6px !important;
            padding: 6px 12px !important;
            border: none !important;
            font-size: 14px !important;
        }
    </style>
</head>
<body>

    <script src="firebase-config.js"></script>

    <script>
        let currentUser = null;
        let masterProdukLokal = {};

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                // Ambil data master produk kasir untuk sinkronisasi penambahan data
                database.ref(`kasir_users/${user.uid}/master_produk`).on('value', (snapshot) => {
                    masterProdukLokal = snapshot.val() || {};
                });
            }
        });
    </script>

    <div class="container-scanner">
        <div class="text-center">
            <h1>📷 Pemindai Barcode Produk</h1>
            <p class="subtitle">Arahkan kamera ke barcode untuk mengisi kode secara otomatis</p>
        </div>

        <div id="reader" class="mb-4"></div>

        <div class="card p-3 bg-light border text-start shadow-sm" style="font-size: 0.9rem;">
            <label class="fw-bold text-secondary mb-2">➕ Tambah / Update Produk dari Scan:</label>
            
            <div class="mb-2">
                <label class="form-label small fw-semibold mb-1">Kode Barcode Terpindai</label>
                <input type="text" id="scanBarcodeBarang" class="form-control form-control-sm fw-mono bg-white text-primary fw-bold" placeholder="Menunggu hasil scan kamera..." readonly>
            </div>

            <div class="mb-2">
                <label class="form-label small fw-semibold mb-1">Nama Barang</label>
                <input type="text" id="scanNamaBarang" class="form-control form-control-sm" placeholder="Masukkan nama barang">
            </div>

            <div class="mb-2">
                <label class="form-label small fw-semibold mb-1">Harga Satuan</label>
                <div class="input-group input-group-sm">
                    <span class="input-group-text">Rp</span>
                    <input type="text" id="scanHargaBarangTampilan" inputmode="numeric" class="form-control" placeholder="Harga Satuan">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-semibold mb-1">Jumlah Sisa Stok</label>
                <input type="number" id="scanStokBarang" class="form-control form-control-sm" placeholder="Jumlah sisa stok">
            </div>

            <div class="row g-2">
                <div class="col-8">
                    <button class="btn btn-primary btn-sm w-100 fw-bold shadow-sm" onclick="simpanProdukDariScan()">💾 Simpan ke Sistem</button>
                </div>
                <div class="col-4">
                    <a href="index.html" class="btn btn-secondary btn-sm w-100 fw-bold shadow-sm">🔙 Kembali</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function formatRupiah(angka) {
            if (!angka) return "";
            return Math.round(angka).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // Event listener format mata uang saat diketik manual
        document.getElementById('scanHargaBarangTampilan').addEventListener('input', function (e) {
            e.target.value = formatRupiah(e.target.value.replace(/\D/g, ""));
        });

        // Handler Sukses Scan Barcode Kamera
        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('scanBarcodeBarang').value = decodedText;
            
            // FITUR PINTAR: Jika nomor barcode yang di-scan ternyata sudah terdaftar sebelumnya di sistem kasir,
            // otomatis isi nama, harga, dan stok lamanya agar kasir tinggal memperbarui datanya saja.
            for (let nama in masterProdukLokal) {
                if (masterProdukLokal[nama].barcode && masterProdukLokal[nama].barcode === decodedText) {
                    document.getElementById('scanNamaBarang').value = nama;
                    document.getElementById('scanHargaBarangTampilan').value = formatRupiah(masterProdukLokal[nama].harga);
                    document.getElementById('scanStokBarang').value = masterProdukLokal[nama].stok;
                    break;
                }
            }
        }

        function onScanFailure(error) {
            // Pemindaian berlanjut mencari frame barcode secara real-time
        }

        // Jalankan Inisialisasi Scanner HTML5-QRCode
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: { width: 250, height: 120 },
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            },
            /* verbose= */ false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        // Fungsi Simpan ke Cloud Firebase Realtime Database
        function simpanProdukDariScan() {
            const barcode = document.getElementById('scanBarcodeBarang').value.trim();
            const nama = document.getElementById('scanNamaBarang').value.trim();
            const harga = Number(document.getElementById('scanHargaBarangTampilan').value.replace(/\D/g, "")) || 0;
            const stok = Number(document.getElementById('scanStokBarang').value) || 0;

            if (!barcode) {
                Swal.fire({ title: "Scan Belum Ada", text: "Silakan lakukan pemindaian barcode produk terlebih dahulu!", icon: "warning", customClass: { popup: 'rounded-4' } });
                return;
            }
            if (!nama || harga <= 0) {
                Swal.fire({ title: "Data Belum Lengkap", text: "Nama barang dan harga satuan wajib diisi!", icon: "warning", customClass: { popup: 'rounded-4' } });
                return;
            }

            // Simpan / update ke database lokal
            masterProdukLokal[nama] = { harga: harga, stok: stok, barcode: barcode };

            // Kirim pembaharuan data langsung ke Cloud Firebase kasir user
            if (currentUser) {
                database.ref(`kasir_users/${currentUser.uid}/master_produk`).set(masterProdukLokal)
                .then(() => {
                    Swal.fire({
                        title: "Berhasil Disimpan! 🎉",
                        text: `Produk "${nama}" telah terdaftar ke sistem kasir.`,
                        icon: "success",
                        timer: 2000,
                        showConfirmButton: false,
                        customClass: { popup: 'rounded-4' }
                    }).then(() => {
                        // Bersihkan form setelah sukses input agar siap scan barang baru lagi
                        document.getElementById('scanBarcodeBarang').value = "";
                        document.getElementById('scanNamaBarang').value = "";
                        document.getElementById('scanHargaBarangTampilan').value = "";
                        document.getElementById('scanStokBarang').value = "";
                    });
                })
                .catch((error) => {
                    Swal.fire({ title: "Gagal Menyimpan", text: error.message, icon: "error" });
                });
            }
        }
    </script>
</body>
</html>
